name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm install

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: app-v__VERSION__
          releaseName: 'Desktop Pet v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Generate and upload latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $tagName = "app-v$version"
          $exeFile = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.sig" | Select-Object -First 1

          if (-not $exeFile -or -not $sigFile) {
            Write-Error "Could not find .exe or .sig file in nsis bundle directory"
            exit 1
          }

          $signature = Get-Content $sigFile.FullName -Raw

          # Get release info to find the actual release id
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tagName" `
            -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = "application/vnd.github+json" }

          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tagName/$($exeFile.Name)"

          $latestJson = @{
            version = $version
            notes = "Desktop Pet v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $latestJsonPath = "latest.json"
          [System.IO.File]::WriteAllText($latestJsonPath, $latestJson, (New-Object System.Text.UTF8Encoding($False)))

          Write-Host "Generated latest.json:"
          Get-Content $latestJsonPath

          # Upload to release
          $uploadUrl = $release.upload_url -replace '\{.*\}', ''
          $uploadUrl = "$uploadUrl`?name=latest.json&label=latest.json"

          Invoke-RestMethod -Uri $uploadUrl `
            -Method Post `
            -Headers @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              "Content-Type" = "application/json"
            } `
            -InFile $latestJsonPath

          Write-Host "Successfully uploaded latest.json to release $tagName"
